<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Show-Chat Official</title>
    <style>
      :root {
        --bg-darker: #202225;
        --bg-sidebar: #2f3136;
        --bg-chat: #36393f;
        --bg-input: #40444b;
        --text-main: #dcddde;
        --text-muted: #72767d;
        --accent-blue: #5865f2;
        --accent-green: #3ba55d;
        --accent-red: #ed4245;
      }
      body {
        font-family: sans-serif;
        margin: 0;
        background: var(--bg-chat);
        height: 100dvh;
        display: flex;
        color: var(--text-main);
        overflow: hidden;
      }

      /* 認証・BAN */
      #auth-screen,
      #ban-screen {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #auth-screen {
        background: var(--bg-darker);
      }
      #ban-screen {
        background: #000;
        display: none;
        flex-direction: column;
        text-align: center;
        color: white;
        padding: 20px;
      }
      .auth-box {
        background: var(--bg-sidebar);
        padding: 32px;
        border-radius: 8px;
        width: 350px;
      }
      .auth-input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        background: var(--bg-darker);
        border: 1px solid #222;
        color: white;
        border-radius: 4px;
        box-sizing: border-box;
      }
      .icon-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 12px;
        margin: 15px 0;
      }
      .icon-option {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        cursor: pointer;
        border: 3px solid transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        background: #444;
      }
      .icon-option.selected {
        border-color: var(--accent-blue);
        background: #555;
      }

      /* サイドバー */
      .sidebar {
        width: 240px;
        background: var(--bg-sidebar);
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--bg-darker);
      }
      .channel-list {
        flex: 1;
        padding: 10px;
      }
      .section-label {
        padding: 10px;
        font-size: 11px;
        font-weight: bold;
        color: var(--text-muted);
        text-transform: uppercase;
      }
      .channel-item {
        padding: 8px;
        margin: 2px 0;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        font-size: 14px;
      }
      .channel-item.active {
        background: #4f545c;
        color: white;
      }

      /* メインエリア */
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      header {
        height: 48px;
        padding: 0 15px;
        border-bottom: 1px solid var(--bg-darker);
        display: flex;
        align-items: center;
        font-weight: bold;
      }
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 10px 0;
      }
      .msg-row {
        display: flex;
        padding: 8px 20px;
        position: relative;
      }
      .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        margin-right: 15px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        background: #4f545c;
      }
      .user-name {
        font-weight: bold;
        color: white;
      }
      .admin-tag {
        font-size: 10px;
        background: var(--accent-red);
        color: white;
        padding: 2px 6px;
        border-radius: 3px;
        font-weight: bold;
        margin-left: 4px;
      }
      .delete-btn {
        font-size: 11px;
        color: var(--accent-red);
        cursor: pointer;
        opacity: 0;
        margin-left: 10px;
      }
      .msg-row:hover .delete-btn {
        opacity: 1;
      }
      .msg-time {
        font-size: 10px;
        color: var(--text-muted);
        margin-left: 8px;
        font-weight: normal;
      }

      /* 入力エリア */
      .input-area {
        padding: 0 20px 20px;
      }
      .input-box {
        background: var(--bg-input);
        border-radius: 8px;
        padding: 10px 15px;
      }
      #chat-input {
        width: 100%;
        background: transparent;
        border: none;
        color: white;
        outline: none;
      }
      #chat-input:disabled {
        cursor: not-allowed;
        color: var(--text-muted);
      }

      /* オンラインリスト */
      .member-sidebar {
        width: 220px;
        background: var(--bg-sidebar);
        border-left: 1px solid var(--bg-darker);
        display: flex;
        flex-direction: column;
      }
      .member-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 12px;
      }

      /* モーダル */
      #settings-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        z-index: 5000;
        align-items: center;
        justify-content: center;
      }
      .modal-card {
        background: var(--bg-sidebar);
        width: 450px;
        border-radius: 8px;
        padding: 25px;
        max-height: 85vh;
        overflow-y: auto;
      }
      .modal-btn {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: none;
        border-radius: 4px;
        color: white;
        cursor: pointer;
        font-weight: bold;
      }
      .user-list-item {
        background: #202225;
        padding: 10px;
        border-radius: 4px;
        margin-top: 6px;
        font-size: 12px;
        border: 1px solid #333;
      }
      .user-list-main {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .user-list-sub {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        color: var(--text-muted);
        font-size: 10px;
        border-top: 1px solid #333;
        padding-top: 4px;
        margin-top: 4px;
      }
      .unban-btn-small {
        background: var(--accent-green);
        border: none;
        color: white;
        border-radius: 3px;
        padding: 2px 6px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="auth-screen">
      <div class="auth-box">
        <h2 id="auth-title">おかえりなさい！</h2>
        <input
          type="text"
          id="auth-user"
          class="auth-input"
          placeholder="ユーザー名"
        /><input
          type="password"
          id="auth-pass"
          class="auth-input"
          placeholder="パスワード"
        />
        <div id="signup-only" style="display: none">
          <p style="font-size: 11px; color: var(--text-muted)">アイコン選択:</p>
          <div class="icon-grid" id="signup-icon-grid"></div>
        </div>
        <button
          class="modal-btn"
          style="background: var(--accent-blue)"
          id="btn-login"
        >
          ログイン
        </button>
        <p
          id="toggle-auth"
          style="
            font-size: 12px;
            cursor: pointer;
            color: var(--accent-blue);
            text-align: center;
            margin-top: 15px;
          "
        >
          アカウント作成
        </p>
      </div>
    </div>
    <div id="ban-screen">
      <h1>🚫 アクセス制限中</h1>
      <div
        id="ban-reason-text"
        style="color: var(--accent-red); margin-top: 10px"
      ></div>
    </div>

    <aside class="sidebar">
      <header>Show-Chat</header>
      <div class="channel-list">
        <div class="section-label">ルーム</div>
        <div class="channel-item active" onclick="switchRoom('ロビー')">
          ロビー
        </div>
        <div class="channel-item" onclick="switchRoom('雑談')">雑談</div>
        <div class="channel-item" onclick="switchRoom('プロキシ交換')">
          プロキシ交換
        </div>
      </div>
      <div
        style="
          padding: 10px;
          background: rgba(0, 0, 0, 0.2);
          display: flex;
          align-items: center;
          gap: 10px;
        "
      >
        <div
          id="my-avatar"
          class="avatar"
          style="width: 32px; height: 32px; font-size: 18px"
        >
          👤
        </div>
        <div
          id="my-name"
          style="
            flex: 1;
            font-size: 13px;
            font-weight: bold;
            overflow: hidden;
            text-overflow: ellipsis;
          "
        ></div>
        <div style="cursor: pointer" id="open-settings">⚙️</div>
      </div>
    </aside>

    <main>
      <header id="current-room-name"># ロビー</header>
      <div id="messages"></div>
      <div class="input-area">
        <div class="input-box">
          <input type="text" id="chat-input" placeholder="メッセージを送信" />
        </div>
      </div>
    </main>

    <aside class="member-sidebar">
      <div class="section-label" id="member-count">オンライン - 0</div>
      <div id="member-list"></div>
    </aside>

    <div id="settings-modal">
      <div class="modal-card">
        <h3>設定</h3>
        <p style="font-size: 11px; color: var(--text-muted)">アイコン変更:</p>
        <div class="icon-grid" id="settings-icon-grid"></div>
        <div
          id="admin-panel"
          style="
            display: none;
            border-top: 1px solid #444;
            padding-top: 15px;
            margin-top: 15px;
          "
        >
          <p
            style="color: var(--accent-red); font-size: 11px; font-weight: bold"
          >
            👑 管理パネル
          </p>
          <button
            class="modal-btn"
            style="background: var(--accent-red)"
            onclick="adminClearHistory()"
          >
            履歴全消去
          </button>
          <button
            class="modal-btn"
            style="background: #faa61a"
            id="room-lock-btn"
            onclick="adminToggleLock()"
          >
            部屋を停止
          </button>
          <button
            class="modal-btn"
            style="background: var(--accent-blue)"
            onclick="adminBanUser()"
          >
            ユーザーBAN
          </button>
          <button
            class="modal-btn"
            style="background: #7289da"
            onclick="adminToggleUserList()"
          >
            登録ユーザー一覧
          </button>
          <div
            id="user-list-display"
            style="
              max-height: 250px;
              overflow-y: auto;
              margin-top: 10px;
              display: none;
              background: rgba(0, 0, 0, 0.2);
              border-radius: 4px;
              padding: 5px;
            "
          ></div>
        </div>
        <button
          class="modal-btn"
          style="background: #4f545c; margin-top: 15px"
          onclick="closeSettings()"
        >
          閉じる
        </button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        set,
        push,
        onValue,
        serverTimestamp,
        get,
        update,
        remove,
        onDisconnect,
        off,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCVoT10q21bNe7ks6DrLZWkl0JIJ2cIa0s",
        authDomain: "mochimochi-chat8.firebaseapp.com",
        databaseURL: "https://mochimochi-chat8-default-rtdb.firebaseio.com",
        projectId: "mochimochi-chat8",
      };
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      let currentUser = null;
      let currentRoom = "ロビー";
      let isSignup = false;
      let selectedEmoji = "🐱";
      let bans = {};
      let userListInterval = null;
      let isCooldown = false;

      // --- 簡易端末ID（指紋）作成機能 ---
      function generateDeviceID() {
        const info = [
          navigator.userAgent,
          screen.width,
          screen.height,
          navigator.language,
          new Date().getTimezoneOffset()
        ].join('|');
        // 簡単なハッシュ化のような処理
        let hash = 0;
        for (let i = 0; i < info.length; i++) {
          hash = ((hash << 5) - hash) + info.charCodeAt(i);
          hash |= 0;
        }
        return "ID-" + Math.abs(hash).toString(16).toUpperCase();
      }
      const myDeviceID = generateDeviceID();

      let afkTimer;
      const AFK_TIMEOUT = 60000;

      const presetEmojis = ["🐱", "🐶", "🦊", "🐻", "🐼", "🦁", "🐸", "🐨", "🐷", "🤖"];

      const isBadName = (n) => {
        if (!n || typeof n !== "string") return true;
        const low = n.toLowerCase();
        return (
          low.includes("https") ||
          low.startsWith("u-") ||
          low.includes("/") ||
          low.includes(".") ||
          n.length < 1 ||
          n.length > 15
        );
      };

      function renderIconGrids() {
        [
          document.getElementById("signup-icon-grid"),
          document.getElementById("settings-icon-grid"),
        ].forEach((grid) => {
          if (!grid) return;
          grid.innerHTML = "";
          presetEmojis.forEach((e) => {
            const div = document.createElement("div");
            div.className = "icon-option";
            div.innerText = e;
            div.onclick = () => {
              grid.querySelectorAll(".icon-option").forEach((el) => el.classList.remove("selected"));
              div.classList.add("selected");
              selectedEmoji = e;
              if (currentUser) updateProfileIcon(e);
            };
            grid.appendChild(div);
          });
        });
      }
      renderIconGrids();

      onValue(ref(db, "bans"), (snap) => {
        bans = snap.exists() ? snap.val() : {};
        if (currentUser && bans[currentUser.name]) {
          document.getElementById("ban-screen").style.display = "flex";
          document.getElementById("ban-reason-text").innerText = "理由: " + (bans[currentUser.name].reason || "なし");
          currentUser = null;
        }
      });

      document.getElementById("btn-login").onclick = async () => {
        const nameInput = document.getElementById("auth-user").value.trim();
        const pass = document.getElementById("auth-pass").value.trim();
        if (isBadName(nameInput)) return alert("名前が不適切です");
        if (!pass) return alert("パスワードを入力");
        if (bans[nameInput]) return alert("BANされています");

        if (isSignup) {
          if (localStorage.getItem("chat_registered")) {
            return alert("この端末からは既にアカウントが作成されています。");
          }
          const userRef = ref(db, `users/${nameInput}`);
          const snap = await get(userRef);
          if (snap.exists()) return alert("既に使用されています");

          const u = {
            name: nameInput,
            pass,
            icon: selectedEmoji,
            isAdmin: nameInput === "Show",
            createdAt: Date.now(),
            deviceID: myDeviceID // ★IPの代わりに端末IDを保存
          };
          await set(userRef, u);
          localStorage.setItem("chat_registered", "true");
          loginSuccess(u);
        } else {
          const snap = await get(ref(db, `users/${nameInput}`));
          if (!snap.exists() || snap.val().pass !== pass) return alert("認証失敗");
          const u = snap.val();
          await update(ref(db, `users/${nameInput}`), { deviceID: myDeviceID }); // ★ログイン時も更新
          loginSuccess({ ...u, deviceID: myDeviceID });
        }
      };

      function loginSuccess(user) {
        currentUser = user;
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("my-name").innerText = user.name;
        document.getElementById("my-avatar").innerText = user.icon || "👤";
        if (user.isAdmin) document.getElementById("admin-panel").style.display = "block";
        const statusRef = ref(db, `online/${user.name}`);
        set(statusRef, {
          icon: user.icon || "👤",
          isAdmin: !!user.isAdmin,
          isAFK: false,
        });
        onDisconnect(statusRef).remove();
        loadMessages();
        loadOnlineMembers();
        setupLockCheck();
        startAFKWatcher();
      }

      async function updateProfileIcon(emoji) {
        if (!currentUser) return;
        await set(ref(db, `users/${currentUser.name}/icon`), emoji);
        await update(ref(db, `online/${currentUser.name}`), { icon: emoji });
        currentUser.icon = emoji;
        document.getElementById("my-avatar").innerText = emoji;
      }

      window.switchRoom = (room) => {
        if (currentRoom === room) return;
        off(ref(db, `messages/${currentRoom}`));
        currentRoom = room;
        document.getElementById("current-room-name").innerText = `# ${room}`;
        document.querySelectorAll(".channel-item").forEach((el) => el.classList.toggle("active", el.innerText.trim() === room));
        loadMessages();
        setupLockCheck();
      };

      function formatFullTime(ts) {
        if (!ts) return "";
        const d = new Date(ts);
        return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}:${String(d.getSeconds()).padStart(2, "0")}`;
      }

      function loadMessages() {
        const box = document.getElementById("messages");
        onValue(ref(db, `messages/${currentRoom}`), (snap) => {
          box.innerHTML = "";
          snap.forEach((c) => {
            const m = c.val();
            const timeStr = formatFullTime(m.time);
            const div = document.createElement("div");
            div.className = "msg-row";
            div.innerHTML = `<div class="avatar">${m.icon || "👤"}</div><div style="flex:1"><div class="msg-header"><span class="user-name">${m.name}</span>${m.isAdmin ? '<span class="admin-tag">管理者</span>' : ""}<span class="msg-time">${timeStr}</span>${currentUser?.isAdmin || m.name === currentUser?.name ? `<span class="delete-btn" onclick="deleteMsg('${c.key}')">削除</span>` : ""}</div><div>${m.text}</div></div>`;
            box.appendChild(div);
          });
          box.scrollTop = box.scrollHeight;
        });
      }

      window.deleteMsg = (key) => {
        if (confirm("削除しますか？")) remove(ref(db, `messages/${currentRoom}/${key}`));
      };

      document.getElementById("chat-input").onkeydown = async (e) => {
        if (e.key === "Enter" && e.target.value.trim() && currentUser) {
          if (isCooldown && !currentUser.isAdmin) return;
          const lockSnap = await get(ref(db, `locks/${currentRoom}`));
          if (lockSnap.val() && !currentUser.isAdmin) return alert("停止中");
          push(ref(db, `messages/${currentRoom}`), {
            name: currentUser.name,
            text: e.target.value,
            icon: currentUser.icon || "👤",
            isAdmin: !!currentUser.isAdmin,
            time: serverTimestamp(),
          });
          e.target.value = "";
          if (!currentUser.isAdmin) startCooldown(5);
        }
      };

      function startCooldown(seconds) {
        isCooldown = true;
        const input = document.getElementById("chat-input");
        let remaining = seconds;
        input.disabled = true;
        const timer = setInterval(() => {
          remaining--;
          if (remaining <= 0) {
            clearInterval(timer);
            isCooldown = false;
            input.disabled = false;
            input.placeholder = "メッセージを送信";
            input.focus();
          } else {
            input.placeholder = `待機中 (${remaining}s)`;
          }
        }, 1000);
        input.placeholder = `待機中 (${remaining}s)`;
      }

      function loadOnlineMembers() {
        onValue(ref(db, "online"), (snap) => {
          const list = document.getElementById("member-list");
          list.innerHTML = "";
          let count = 0;
          let members = [];
          snap.forEach((c) => {
            if (!bans[c.key]) {
              count++;
              members.push({ name: c.key, ...c.val() });
            }
          });
          members.sort((a, b) => b.isAdmin === a.isAdmin ? 0 : b.isAdmin ? 1 : -1);
          members.forEach((u) => {
            list.innerHTML += `<div class="member-item"><div class="avatar" style="width:24px;height:24px;font-size:14px">${u.icon || "👤"}</div><span style="font-size:13px">${u.name}${u.isAFK ? ' <span style="color:var(--text-muted)">AFK</span>' : ""}</span>${u.isAdmin ? '<span class="admin-tag">管理者</span>' : ""}</div>`;
          });
          document.getElementById("member-count").innerText = `オンライン - ${count}`;
        });
      }

      window.adminToggleUserList = () => {
        const d = document.getElementById("user-list-display");
        if (d.style.display === "none") {
          d.style.display = "block";
          adminShowUserList();
          userListInterval = setInterval(adminShowUserList, 5000);
        } else {
          d.style.display = "none";
          clearInterval(userListInterval);
        }
      };

      window.adminShowUserList = async () => {
        const display = document.getElementById("user-list-display");
        const snap = await get(ref(db, "users"));
        if (!snap.exists()) return;
        const usersData = snap.val();
        display.innerHTML = "";
        for (let name in usersData) {
          if (isBadName(name)) continue;

          const u = usersData[name];
          const isBanned = !!bans[name];
          const joinTimeStr = u.createdAt ? new Date(u.createdAt).toLocaleString("ja-JP") : "不明";

          const div = document.createElement("div");
          div.className = "user-list-item";
          div.innerHTML = `<div class="user-list-main"><div>${u.icon || "👤"} <b>${name}</b> ${u.isAdmin ? "👑" : ""}${isBanned ? '<span style="color:red">[BAN中]</span>' : ""}</div>${isBanned ? `<button class="unban-btn-small" onclick="unbanUser('${name}')">解除</button>` : ""}</div>
          <div class="user-list-sub">
            <span style="color:#5865f2">端末ID: ${u.deviceID || "不明"}</span>
            <span>PASS: ${u.isAdmin ? "****" : u.pass}</span>
            <span>参加日: ${joinTimeStr}</span>
          </div>`;
          display.appendChild(div);
        }
      };

      window.adminBanUser = () => {
        const t = prompt("BANするユーザー名:");
        if (t && t !== "Show") {
          const r = prompt("理由:", "規約違反");
          if (r !== null) set(ref(db, `bans/${t}`), { reason: r });
        }
      };
      window.unbanUser = (name) => {
        if (confirm(name + "を解除しますか？")) remove(ref(db, `bans/${name}`));
      };
      window.adminClearHistory = () => {
        if (confirm("履歴をすべて消去しますか？")) remove(ref(db, `messages/${currentRoom}`));
      };
      window.adminToggleLock = async () => {
        const r = ref(db, `locks/${currentRoom}`);
        const s = await get(r);
        await set(r, !(s.val() || false));
      };
      function setupLockCheck() {
        onValue(ref(db, `locks/${currentRoom}`), (snap) => {
          const isL = snap.val() || false;
          const input = document.getElementById("chat-input");
          document.getElementById("room-lock-btn").innerText = isL ? "解除" : "停止";
          input.placeholder = isL ? "停止中" : "メッセージを送信";
          input.disabled = (isL && !currentUser.isAdmin) || isCooldown;
        });
      }
      window.closeSettings = () => {
        document.getElementById("settings-modal").style.display = "none";
        clearInterval(userListInterval);
      };

      function startAFKWatcher() {
        const resetTimer = () => {
          if (currentUser) {
            get(ref(db, `online/${currentUser.name}/isAFK`)).then((snap) => {
              if (snap.val() === true) update(ref(db, `online/${currentUser.name}`), { isAFK: false });
            });
          }
          clearTimeout(afkTimer);
          afkTimer = setTimeout(goAFK, AFK_TIMEOUT);
        };
        const goAFK = () => {
          if (currentUser) update(ref(db, `online/${currentUser.name}`), { isAFK: true });
        };
        ["mousemove", "keydown", "mousedown", "touchstart"].forEach((ev) => window.addEventListener(ev, resetTimer));
        resetTimer();
      }

      document.getElementById("toggle-auth").onclick = () => {
        isSignup = !isSignup;
        document.getElementById("auth-title").innerText = isSignup ? "作成" : "おかえりなさい！";
        document.getElementById("signup-only").style.display = isSignup ? "block" : "none";
        document.getElementById("btn-login").innerText = isSignup ? "作成" : "ログイン";
        document.getElementById("toggle-auth").innerText = isSignup ? "戻る" : "作成";
      };
      document.getElementById("open-settings").onclick = () => (document.getElementById("settings-modal").style.display = "flex");
    </script>
  </body>
</html>
